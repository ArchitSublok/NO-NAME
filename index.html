<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahayakAI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #070F20; color: #D8EFFF; min-height: 100vh; font-family: sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        .msg-enter { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        /* Scrollbar styling for a pro look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #070F20; }
        ::-webkit-scrollbar-thumb { background: #1A2A4A; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const C = { bg: '#070F20', bgCard: 'rgba(14,30,65,0.8)', accent: '#00CFFF', accentBorder: 'rgba(0,207,255,0.3)', textMid: 'rgba(180,225,255,0.65)' };
        const STATES = ["Delhi", "Maharashtra", "Karnataka", "Uttar Pradesh", "Tamil Nadu", "Gujarat", "Rajasthan", "Punjab", "West Bengal", "Bihar"];

        function Landing({ onStart }) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px', textAlign: 'center' }}>
                    <div style={{ fontSize: '70px', marginBottom: '20px' }}>🤝</div>
                    <h1 style={{ fontSize: '42px', margin: '0' }}>Sahayak<span style={{ color: C.accent }}>AI</span></h1>
                    <p style={{ color: C.textMid, maxWidth: '350px', lineHeight: '1.6', margin: '20px 0 40px' }}>Your AI companion for Indian Government Schemes.</p>
                    <button onClick={onStart} style={{ background: C.accent, color: '#001020', border: 'none', borderRadius: '30px', padding: '16px 48px', fontSize: '18px', fontWeight: 'bold', cursor: 'pointer', boxShadow: `0 0 20px ${C.accentBorder}` }}>Get Started →</button>
                </div>
            );
        }

        function Profile({ onComplete }) {
            const [step, setStep] = useState(1);
            const [p, setP] = useState({ age: '', gender: '', state: '', occ: '' });
            const pill = (val, field) => ({
                padding: '10px 18px', margin: '5px', borderRadius: '20px', cursor: 'pointer', fontSize: '14px',
                background: p[field] === val ? C.accent : 'rgba(255,255,255,0.05)',
                color: p[field] === val ? '#001020' : 'white',
                border: `1px solid ${p[field] === val ? C.accent : 'rgba(255,255,255,0.1)'}`,
                transition: '0.2s'
            });

            return (
                <div style={{ maxWidth: '420px', margin: '60px auto', padding: '30px', background: C.bgCard, borderRadius: '24px', border: `1px solid ${C.accentBorder}`, backdropFilter: 'blur(10px)' }}>
                    <h2 style={{ textAlign: 'center', marginBottom: '30px' }}>{step === 1 ? "About You" : "Location"}</h2>
                    {step === 1 ? (
                        <div className="msg-enter">
                            <input type="number" placeholder="Enter Age" style={{ width: '100%', padding: '14px', background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(255,255,255,0.1)', color: 'white', borderRadius: '12px', marginBottom: '20px', boxSizing: 'border-box' }} onChange={e => setP({...p, age: e.target.value})} />
                            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', marginBottom: '30px' }}>
                                {["Male", "Female", "Other"].map(g => <div key={g} onClick={() => setP({...p, gender: g})} style={pill(g, 'gender')}>{g}</div>)}
                            </div>
                            <button onClick={() => p.age && p.gender && setStep(2)} style={{ width: '100%', padding: '14px', background: C.accent, border: 'none', borderRadius: '12px', fontWeight: 'bold', cursor: 'pointer' }}>Next</button>
                        </div>
                    ) : (
                        <div className="msg-enter">
                            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', maxHeight: '160px', overflowY: 'auto', background: 'rgba(0,0,0,0.2)', padding: '10px', borderRadius: '12px', marginBottom: '20px' }}>
                                {STATES.map(s => <div key={s} onClick={() => setP({...p, state: s})} style={pill(s, 'state')}>{s}</div>)}
                            </div>
                            <input placeholder="Occupation (e.g. Farmer)" style={{ width: '100%', padding: '14px', background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(255,255,255,0.1)', color: 'white', borderRadius: '12px', marginBottom: '25px', boxSizing: 'border-box' }} onChange={e => setP({...p, occ: e.target.value})} />
                            <button onClick={() => onComplete(p)} style={{ width: '100%', padding: '14px', background: C.accent, border: 'none', borderRadius: '12px', fontWeight: 'bold', cursor: 'pointer' }}>Finish</button>
                        </div>
                    )}
                </div>
            );
        }

        function Chat({ profile }) {
            const [msgs, setMsgs] = useState([{ r: 'ai', t: `Namaste! I'm Sahayak. I've found 3 schemes for a ${profile.occ} in ${profile.state}. What would you like to know?` }]);
            const [input, setInput] = useState('');
            const end = useRef(null);
            useEffect(() => end.current?.scrollIntoView({ behavior: 'smooth' }), [msgs]);

            return (
                <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', maxWidth: '700px', margin: '0 auto' }}>
                    <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>
                        {msgs.map((m, i) => (
                            <div key={i} className="msg-enter" style={{ alignSelf: m.r==='u' ? 'flex-end' : 'flex-start', background: m.r==='u' ? C.accentBorder : 'rgba(255,255,255,0.05)', padding: '14px', borderRadius: '18px', marginBottom: '12px', marginLeft: m.r==='u' ? 'auto' : '0', maxWidth: '80%', border: '1px solid rgba(255,255,255,0.05)' }}>{m.t}</div>
                        ))}
                        <div ref={end} />
                    </div>
                    <div style={{ padding: '20px', display: 'flex', gap: '10px', background: '#0A1428' }}>
                        <input style={{ flex: 1, padding: '14px', borderRadius: '12px', border: '1px solid #1A2A4A', background: '#000', color: '#fff' }} value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && (setMsgs([...msgs, {r:'u',t:input}, {r:'ai',t:'Thinking...'}]), setInput(''))} placeholder="Ask me anything..." />
                        <button style={{ padding: '0 25px', background: C.accent, border: 'none', borderRadius: '12px', fontWeight: 'bold' }}>Send</button>
                    </div>
                </div>
            );
        }

        function App() {
            const [v, setV] = useState('lnd');
            const [p, setP] = useState(null);
            return (
                <div style={{ background: '#070F20', minHeight: '100vh' }}>
                    {v === 'lnd' && <Landing onStart={() => setV('prf')} />}
                    {v === 'prf' && <Profile onComplete={data => { setP(data); setV('cht'); }} />}
                    {v === 'cht' && <Chat profile={p} />}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
