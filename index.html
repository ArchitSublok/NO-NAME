<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahayakAI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #070F20; color: #D8EFFF; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        @keyframes blink { 0%,100%{opacity:.25;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,207,255,0.4)} 70%{box-shadow:0 0 0 8px rgba(0,207,255,0)} }
        .msg-enter { animation: fadeIn 0.3s ease forwards; }
        .chip:hover { background: rgba(0,207,255,0.18) !important; border-color: rgba(0,207,255,0.4) !important; cursor:pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Use React global specifically
        const { useState, useEffect, useRef } = React;

        const C = {
            bg: '#070F20',
            bgCard: 'rgba(14,30,65,0.8)',
            accent: '#00CFFF',
            text: '#D8EFFF',
            textMid: 'rgba(180,225,255,0.65)',
        };

        function Landing({ onStart }) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px', textAlign: 'center' }}>
                    <div style={{ fontSize: '64px', marginBottom: '20px' }}>🤝</div>
                    <h1 style={{ fontSize: '48px', margin: '0 0 10px' }}>Sahayak<span style={{ color: C.accent }}>AI</span></h1>
                    <p style={{ color: C.textMid, fontSize: '18px', maxWidth: '400px', marginBottom: '40px' }}>
                        Your intelligent multilingual guide to Indian government welfare schemes.
                    </p>
                    <button 
                        onClick={onStart}
                        style={{ 
                            background: 'linear-gradient(135deg, #00CFFF, #0070FF)', 
                            color: '#001020', 
                            border: 'none', 
                            borderRadius: '12px', 
                            padding: '16px 40px', 
                            fontSize: '18px', 
                            fontWeight: 'bold', 
                            cursor: 'pointer',
                            animation: 'pulse 2s infinite'
                        }}
                    >
                        Start Finding Schemes →
                    </button>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('landing');

            return (
                <div style={{ background: C.bg, minHeight: '100vh' }}>
                    {view === 'landing' ? (
                        <Landing onStart={() => setView('profile')} />
                    ) : (
                        <div style={{ padding: '40px', textAlign: 'center' }}>
                            <h2>Profile Section</h2>
                            <p>This is where the user data collection will happen.</p>
                            <button onClick={() => setView('landing')} style={{color: C.accent, background: 'none', border: '1px solid ' + C.accent, padding: '10px', borderRadius: '8px', cursor: 'pointer'}}>Back to Home</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
