<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahayakAI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #070F20; color: #D8EFFF; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        @keyframes blink { 0%,100%{opacity:.25;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,207,255,0.4)} 70%{box-shadow:0 0 0 8px rgba(0,207,255,0)} }
        .msg-enter { animation: fadeIn 0.3s ease forwards; }
        .chip:hover { background: rgba(0,207,255,0.18) !important; border-color: rgba(0,207,255,0.4) !important; cursor:pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

   <script type="text/babel">
    const { useState, useEffect, useRef } = React;

const C = {
    bg: '#070F20',
    bgCard: 'rgba(14,30,65,0.8)',
    accent: '#00CFFF',
    accentBorder: 'rgba(0,207,255,0.3)',
    textMid: 'rgba(180,225,255,0.65)'
};

const INDIAN_STATES = ["Andhra Pradesh", "Assam", "Bihar", "Delhi", "Gujarat", "Haryana", "Karnataka", "Maharashtra", "Punjab", "Rajasthan", "Tamil Nadu", "Uttar Pradesh", "West Bengal"];

function Landing({ onStart }) {
    return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px', textAlign: 'center' }}>
            <div style={{ fontSize: '64px', marginBottom: '20px' }}>🤝</div>
            <h1 style={{ fontSize: '48px', margin: '0 0 10px' }}>Sahayak<span style={{ color: C.accent }}>AI</span></h1>
            <p style={{ color: C.textMid, fontSize: '18px', maxWidth: '400px', marginBottom: '40px' }}>Your intelligent guide to Indian government welfare schemes.</p>
            <button onClick={onStart} style={{ background: 'linear-gradient(135deg, #00CFFF, #0070FF)', color: '#001020', border: 'none', borderRadius: '12px', padding: '16px 40px', fontSize: '18px', fontWeight: 'bold', cursor: 'pointer' }}>Start Finding Schemes →</button>
        </div>
    );
}

function Profile({ onComplete }) {
    const [step, setStep] = useState(1);
    const [p, setP] = useState({ age: '', gender: '', state: '', occupation: '' });
    const inputStyle = { width: '100%', padding: '12px', borderRadius: '8px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', color: 'white', fontSize: '16px', marginBottom: '15px', boxSizing: 'border-box' };

    return (
        <div style={{ maxWidth: '400px', margin: '80px auto', padding: '30px', background: C.bgCard, borderRadius: '20px', border: `1px solid ${C.accentBorder}`, textAlign: 'center' }}>
            <h2 style={{ marginBottom: '20px' }}>{step === 1 ? "Basic Details" : "Your Location"}</h2>
            {step === 1 ? (
                <div className="msg-enter">
                    <input type="number" placeholder="Age" style={inputStyle} value={p.age} onChange={e => setP({...p, age: e.target.value})} />
                    <select style={inputStyle} value={p.gender} onChange={e => setP({...p, gender: e.target.value})}>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <button onClick={() => setStep(2)} style={{ width: '100%', padding: '12px', background: C.accent, border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' }}>Next</button>
                </div>
            ) : (
                <div className="msg-enter">
                    <select style={inputStyle} value={p.state} onChange={e => setP({...p, state: e.target.value})}>
                        <option value="">Select State</option>
                        {INDIAN_STATES.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                    <input placeholder="Occupation (e.g. Student)" style={inputStyle} value={p.occupation} onChange={e => setP({...p, occupation: e.target.value})} />
                    <button onClick={() => onComplete(p)} style={{ width: '100%', padding: '12px', background: C.accent, border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' }}>Finish & Chat</button>
                </div>
            )}
        </div>
    );
}

function Chat({ profile }) {
    const [messages, setMessages] = useState([{ role: 'ai', text: `Namaste! I see you are from ${profile.state}. How can I help you find schemes today?` }]);
    const [input, setInput] = useState('');
    const endRef = useRef(null);

    useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

    const send = () => {
        if (!input.trim()) return;
        setMessages(prev => [...prev, { role: 'user', text: input }, { role: 'ai', text: "I'm checking the database for schemes that match your profile..." }]);
        setInput('');
    };

    return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', maxWidth: '600px', margin: '0 auto' }}>
            <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>
                {messages.map((m, i) => (
                    <div key={i} className="msg-enter" style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', background: m.role === 'user' ? C.accentBorder : 'rgba(255,255,255,0.05)', padding: '12px', borderRadius: '12px', marginBottom: '10px', marginLeft: m.role === 'user' ? 'auto' : '0', maxWidth: '80%', border: '1px solid rgba(255,255,255,0.1)' }}>{m.text}</div>
                ))}
                <div ref={endRef} />
            </div>
            <div style={{ padding: '20px', display: 'flex', gap: '10px', background: C.bgCard }}>
                <input style={{ flex: 1, padding: '12px', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.1)', background: '#000', color: '#fff' }} value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} placeholder="Type your message..." />
                <button onClick={send} style={{ padding: '12px 20px', background: C.accent, border: 'none', borderRadius: '8px', fontWeight: 'bold', cursor: 'pointer' }}>Send</button>
            </div>
        </div>
    );
}

function App() {
    const [view, setView] = useState('landing');
    const [profile, setProfile] = useState(null);

    return (
        <div style={{ background: '#070F20', minHeight: '100vh' }}>
            {view === 'landing' && <Landing onStart={() => setView('profile')} />}
            {view === 'profile' && <Profile onComplete={p => { setProfile(p); setView('chat'); }} />}
            {view === 'chat' && profile && <Chat profile={profile} />}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

    
       
</body>
</html>
